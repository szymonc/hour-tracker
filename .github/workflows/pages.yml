# Build the Angular app and deploy to GitHub Pages (static hosting).
# Repo settings → Pages → Source: GitHub Actions.
#
# Base URL: project sites use /repo-name/; user/org sites (repo named *.github.io) use /.
# Override anytime with repository variable PAGES_BASE_HREF (e.g. /custom/).
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set base href for GitHub Pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OVERRIDE: ${{ vars.PAGES_BASE_HREF }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            echo "BASE_HREF=$OVERRIDE" >> "$GITHUB_ENV"
          elif [[ "$REPO_NAME" == *.github.io ]]; then
            echo "BASE_HREF=/" >> "$GITHUB_ENV"
          else
            echo "BASE_HREF=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build:prod -- --base-href "$BASE_HREF"

      - name: SPA fallback (copy index.html to 404.html)
        run: cp frontend/dist/circle-hours-web/browser/index.html frontend/dist/circle-hours-web/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/circle-hours-web/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
